{% extends 'blog/base.html' %}

{% block content %}

<div class="form-container">

    <h2>Update Blog</h2>

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        <label>Title</label>
        <input
            type="text"
            name="title"
            value="{{ blog.title }}"
            required
        >

        <label>Author</label>

        <select name="author">

            {% for author in authors %}

            <option
                value="{{ author.id }}"
                {% if author.id == blog.author.id %}
                    selected
                {% endif %}
            >
                {{ author.name }}
            </option>

            {% endfor %}

        </select>

        <label>Category</label>

        <select name="category">

            {% for category in categories %}

            <option
                value="{{ category.id }}"
                {% if category.id == blog.category.id %}
                    selected
                {% endif %}
            >
                {{ category.name }}
            </option>

            {% endfor %}

        </select>

        <label>Current Image</label>

        {% if blog.image %}
            <img
                src="{{ blog.image.url }}"
                alt="{{ blog.title }}"
                width="250"
                style="border-radius:10px;margin-bottom:15px;"
            >
        {% else %}
            <p>No image uploaded.</p>
        {% endif %}

        <label>Change Blog Image</label>
        <input type="file" name="image">

        <label>Content</label>

        <textarea
            name="content"
            rows="6"
            required
        >{{ blog.content }}</textarea>

        <div class="button-group">

            <button type="submit">
                Update Blog
            </button>

            <a href="/" class="back-btn">
                Back
            </a>

        </div>

    </form>

</div>

{% endblock %}
