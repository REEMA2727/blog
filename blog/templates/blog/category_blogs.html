{% extends 'blog/base.html' %}

{% block content %}

<div class="form-container">

    <h2>📂 {{ category.name }} Blogs</h2>

    <div class="blog-grid">

        {% for blog in blogs %}

        <div class="blog-card">

            <h2>{{ blog.title }}</h2>

            <p><strong>Author:</strong> {{ blog.author }}</p>

            <p>{{ blog.content|truncatewords:30 }}</p>

            <a href="/detail/{{ blog.id }}/" class="btn">
                Read More
            </a>

        </div>

        {% empty %}

        <h3>No blogs in this category</h3>

        {% endfor %}

    </div>

    <br>

    <a href="/categories/" class="back-btn">⬅ Back</a>

</div>

{% endblock %}
